server:
  port: 8080

spring:
  application:
    name: procurement-gateway
  cloud:
    gateway:
      routes:
        - id: system-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/system/**
        - id: plan-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/plan/**
        - id: requirement-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/requirement/**
        - id: document-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/document/**
        - id: review-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/review/**
        - id: contract-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/contract/**
  redis:
    host: localhost
    port: 6379
